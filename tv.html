    <style>
        :root {
            --bg: #090d16;
            --card: #e5f0fe;
            --accent: #00d4ff;
            --text-main: #090d16;
            --text-muted: #8e9bb0;
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 75px;
            user-select: none;
        }

        /* Buscador Superior Fijo */
        .header-sticky {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9, 13, 22, 0.95);
            backdrop-filter: blur(8px);
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        #searchBar {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        #searchBar:focus {
            border-color: var(--accent);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Rejilla de 2 Columnas Móvil */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo-wrapper {
            width: 100%;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 5px;
        }

        .card img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .card h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
            height: 34px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .btn-play {
            background: var(--accent);
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 0.5px;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            display: block;
            text-transform: uppercase;
        }

        .btn-play:active {
            transform: scale(0.97);
        }

        /* Barra Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 62px;
            background: #0e1420;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 18px;
            width: 33.33%;
            height: 100%;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            margin-top: 3px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .no-results {
            grid-column: span 2;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
